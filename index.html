  <!-- ===== Content override bootstrap (admin-managed via /admin.html) ===== -->
  <script>
    (function () {
      window.__TIKKE_OVERRIDES = window.__TIKKE_OVERRIDES || {};
      var qs = new URLSearchParams(location.search);
      var isPreview = qs.get("preview") === "1";

      function apply(data) {
        window.__TIKKE_OVERRIDES = data || {};
        if (typeof window.applyContentOverrides === "function") {
          window.applyContentOverrides(window.__TIKKE_OVERRIDES);
        }
      }

      if (isPreview) {
        try {
          var raw = sessionStorage.getItem("tikke_preview_overrides");
          if (raw) window.__TIKKE_OVERRIDES = JSON.parse(raw);
        } catch (e) {}
        window.addEventListener("message", function (e) {
          if (!e.data || e.data.type !== "tikke-overrides") return;
          try { sessionStorage.setItem("tikke_preview_overrides", JSON.stringify(e.data.data || {})); } catch (e2) {}
          apply(e.data.data || {});
        });
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: "tikke-preview-ready" }, "*");
          }
        } catch (e) {}
      } else {
        fetch("content.json?v=" + Date.now(), { cache: "no-store" })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (data) { if (data) apply(data); })
          .catch(function () {});
      }
    })();
  </script>
